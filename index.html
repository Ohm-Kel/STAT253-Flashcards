<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>STAT 253 – Flashcards</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;background:linear-gradient(145deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);font-family:'Source Sans 3',sans-serif;color:#e2e8f0;overflow-x:hidden}
  .app{max-width:580px;margin:0 auto;padding:20px 16px 40px;display:flex;flex-direction:column;align-items:center}
  h1{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;color:#f1f5f9;text-align:center}
  .subtitle{color:#94a3b8;font-size:13px;font-style:italic;text-align:center;margin-top:4px}
  .filter-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:16px 0 12px;width:100%}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #475569;background:#1e293b;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Source Sans 3',sans-serif}
  .filter-btn.active{border-color:var(--cat-color,#3b82f6);background:color-mix(in srgb,var(--cat-color,#3b82f6) 20%,transparent);color:var(--cat-color,#3b82f6)}
  .progress-wrap{width:100%;display:flex;align-items:center;gap:10px;margin:10px 0 14px}
  .progress-track{flex:1;height:5px;background:#334155;border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:3px;transition:width 0.4s ease}
  .progress-label{color:#4ade80;font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;min-width:48px;text-align:right}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
  .dot{width:7px;height:7px;border-radius:50%;background:#475569;cursor:pointer;transition:all 0.25s}
  .dot.active{width:20px;border-radius:4px}
  .dot.known{background:#4ade80}
  .search-wrap{width:100%;margin-bottom:14px;position:relative}
  .search-input{width:100%;padding:10px 16px 10px 38px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:14px;font-family:'Source Sans 3',sans-serif;outline:none}
  .search-input:focus{border-color:#3b82f6}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#64748b;font-size:15px}
  .card-container{width:100%;min-height:480px;perspective:1200px;cursor:pointer}
  .card-inner{width:100%;min-height:480px;position:relative;transform-style:preserve-3d;transition:transform 0.5s ease}
  .card-inner.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;width:100%;min-height:480px;backface-visibility:hidden;border-radius:20px;padding:28px 24px;display:flex;flex-direction:column}
  .card-front{justify-content:center;align-items:center;text-align:center}
  .card-back{transform:rotateY(180deg);gap:12px;overflow-y:auto}
  .card-category{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px}
  .card-symbol{margin-bottom:20px}
  .card-symbol .katex{font-size:1.7em !important}
  .card-question{font-family:'DM Serif Display',serif;font-size:20px;line-height:1.4;color:#e2e8f0}
  .flip-hint{margin-top:24px;font-size:12px;color:#64748b;display:flex;align-items:center;gap:5px}
  .card-back-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:3px}
  .card-desc{font-size:14px;line-height:1.7;color:#cbd5e1}
  .info-box{border-radius:12px;padding:12px 16px}
  .info-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#94a3b8;margin-bottom:6px}
  .info-example{font-size:13px;font-style:italic;color:#94a3b8}
  .math-row{display:flex;align-items:center;gap:8px;margin:5px 0;flex-wrap:wrap}
  .math-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;min-width:72px}
  .formula-line{margin:6px 0;text-align:center}
  .formula-line .katex{font-size:1.15em !important}
  .info-box .katex{font-size:1.0em !important}
  .controls{display:flex;align-items:center;gap:12px;margin-top:20px}
  .nav-btn{width:46px;height:46px;border-radius:50%;border:1px solid #475569;background:#1e293b;color:#e2e8f0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .nav-btn:disabled{color:#475569;cursor:not-allowed}
  .learn-btn{padding:10px 24px;border-radius:14px;border:1.5px solid #475569;background:#1e293b;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.3s;font-family:'Source Sans 3',sans-serif}
  .learn-btn.learned{border-color:#4ade80;background:rgba(74,222,128,0.12);color:#4ade80}
  .card-num{margin-top:12px;color:#64748b;font-size:12px;font-family:'IBM Plex Mono',monospace}
  .empty-state{text-align:center;padding:60px 20px;color:#64748b}
  @media(max-width:400px){.card-symbol .katex{font-size:1.3em !important}.card-question{font-size:17px}.card-face{padding:22px 18px}}
</style>

/* ==========================================================================
   CARD DATA — Cross-checked against:
   * Lecture 5&6  (Discrete RVs, Ch.3)
   * Lecture 7&8  (Continuous RVs, Ch.4)
   * Lecture 9&10 (Joint Distributions & Moments, Ch.5)
   * Montgomery & Runger, Applied Stats & Prob for Engineers (2014)

   SCOPE: Only topics with formulas/definitions explicitly taught in slides.
   NOTATION: Matches lecture slides.
   ========================================================================== */

const CARDS=[

// ============================================================
// CATEGORY: Discrete Foundations (Lecture 5&6, slides 1-29)
// ============================================================
{cat:"Discrete",title:"Random Variable",sym:"X",
front:"What is a Random Variable?",
back:"A function that assigns a real number to each outcome in the sample space of a random experiment. Denoted by uppercase X; observed values by lowercase x. E.g., P(X = x).",
formulas:["X : S \\to \\mathbb{R}"],
m:"",v:"",s:"",
ex:"X = number of lines in use (0 to 48), X = number of cameras that pass (0,1,2,3)",
color:"#475569",accent:"#94a3b8"},

{cat:"Discrete",title:"Probability Mass Function",sym:"f(x) = P(X = x)",
front:"What is a Probability Mass Function (PMF)?",
back:"The set of ordered pairs (x, f(x)) giving the probability for each value of a discrete RV X. Three conditions must hold: (1) f(x\u1d62) \u2265 0, (2) \u03a3f(x\u1d62) = 1, (3) f(x\u1d62) = P(X = x\u1d62).",
formulas:["f(x_i) \\ge 0, \\quad \\sum_{i=1}^{n} f(x_i) = 1, \\quad f(x_i) = P(X = x_i)"],
m:"",v:"",s:"",
ex:"Camera flash test: f(0)=0.008, f(1)=0.096, f(2)=0.384, f(3)=0.512",
color:"#475569",accent:"#94a3b8"},

{cat:"Discrete",title:"Cumulative Distribution Function",sym:"F(x) = P(X \\le x)",
front:"What is the CDF of a Discrete Random Variable?",
back:"F(x) = P(X \u2264 x) = \u03a3 f(x\u1d62) for all x\u1d62 \u2264 x. It is a step function. Properties: (1) 0 \u2264 F(x) \u2264 1, (2) non-decreasing, (3) if x < y then F(x) \u2264 F(y).",
formulas:["F(x) = P(X \\le x) = \\sum_{x_i \\le x} f(x_i)"],
m:"",v:"",s:"",
ex:"Production parts: F(0)=0.886, F(1)=0.997, F(2)=1.000",
color:"#64748b",accent:"#cbd5e1"},

{cat:"Discrete",title:"Expected Value (Mean)",sym:"E[X] = \\mu",
front:"What is the Expected Value of a Discrete RV?",
back:"The probability-weighted average of all possible values. It represents the long-run average when the experiment is repeated indefinitely.",
formulas:["\\mu = E(X) = \\sum_{x} x \\cdot f(x)"],
m:"",v:"",s:"",
ex:"E[die] = 1(1/6)+2(1/6)+\u2026+6(1/6) = 3.5",
color:"#0284c7",accent:"#7dd3fc"},

{cat:"Discrete",title:"Expected Value of h(X)",sym:"E[h(X)]",
front:"How do you find E[h(X)] for a Discrete RV?",
back:"Apply h to each value, then take the probability-weighted sum. You do NOT need to find the distribution of h(X) first. If h(X) = (X\u2212\u03bc)\u00b2, its expectation gives the variance.",
formulas:["E[h(X)] = \\sum_{x} h(x) \\cdot f(x)"],
m:"",v:"",s:"",
ex:"Digital channel: E[X\u00b2] = 0\u00b2(0.6561)+1\u00b2(0.2916)+\u2026+4\u00b2(0.0001) = 0.52",
color:"#0369a1",accent:"#38bdf8"},

{cat:"Discrete",title:"Variance (Discrete)",sym:"\\text{Var}(X) = \\sigma^2",
front:"What is the Variance of a Discrete RV?",
back:"Measures the spread of the distribution. Definition formula uses (x\u2212\u03bc)\u00b2. The computational (shortcut) formula is often easier for manual calculation.",
formulas:["\\sigma^2 = \\sum_{x}(x - \\mu)^2 f(x) = E[X^2] - \\mu^2"],
m:"",v:"",s:"\\sigma = \\sqrt{\\sigma^2}",
ex:"Digital channel: \u03c3\u00b2 = 0.5200 \u2212 0.4\u00b2 = 0.3600",
color:"#0e7490",accent:"#22d3ee"},

{cat:"Discrete",title:"Theorems on E(X)",sym:"E(aX+b)",
front:"What are the key properties of Expected Value?",
back:"Expectation is a linear operator. Constants pass through, sums and differences split. These simplify many calculations.",
formulas:["E(a) = a","E(aX) = aE(X)","E(aX + b) = aE(X) + b","E(aX + bY) = aE(X) + bE(Y)","E(aX - bY) = aE(X) - bE(Y)"],
m:"",v:"",s:"",
ex:"If E(X)=10, then E(3X+5) = 3(10)+5 = 35",
color:"#0284c7",accent:"#7dd3fc"},

{cat:"Discrete",title:"Theorems on Var(X)",sym:"\\text{Var}(aX+b)",
front:"What are the key properties of Variance? (X, Y independent)",
back:"Constants drop out of variance. Scaling by a multiplies variance by a\u00b2. For independent X and Y, variances add (even for subtraction).",
formulas:["\\text{Var}(a) = 0","\\text{Var}(aX) = a^2\\text{Var}(X)","\\text{Var}(aX+b) = a^2\\text{Var}(X)","\\text{Var}(aX \\pm bY) = a^2\\text{Var}(X) + b^2\\text{Var}(Y)"],
m:"",v:"",s:"",
ex:"If Var(X)=4, then Var(3X+5) = 9(4) = 36",
color:"#0e7490",accent:"#22d3ee"},

// ============================================================
// CATEGORY: Discrete Distributions (Lecture 5&6, slides 30-81)
// ============================================================
{cat:"Discrete",title:"Discrete Uniform Distribution",sym:"X \\sim \\text{DU}(a, b)",
front:"What is the Discrete Uniform Distribution?",
back:"The simplest discrete distribution. X assumes consecutive integer values a, a+1, \u2026, b, each with equal probability 1/(b\u2212a+1).",
formulas:["f(x) = \\frac{1}{b - a + 1}, \\quad x = a, a{+}1, \\dots, b"],
m:"\\mu = \\dfrac{a+b}{2}",
v:"\\sigma^2 = \\dfrac{(b-a+1)^2 - 1}{12}",s:"",
ex:"Voice lines: X ~ DU(0,48), \u03bc=24, \u03c3=14.14",
color:"#dc2626",accent:"#fca5a5"},

{cat:"Discrete",title:"Bernoulli Distribution",sym:"X \\sim \\text{Bern}(p)",
front:"What is a Bernoulli Distribution?",
back:"A single trial with two outcomes: success (prob p) or failure (prob 1\u2212p). Forms the building block for the Binomial distribution. When repeated independently with constant p, we get a Bernoulli process.",
formulas:["f(x) = p^x(1-p)^{1-x}, \\quad x = 0, 1"],
m:"\\mu = p",
v:"\\sigma^2 = p(1-p)",
s:"\\sigma = \\sqrt{p(1-p)}",
ex:"Page selection: Y=1 if page 7 selected, p=1/5, E(Y)=0.2, Var(Y)=4/25",
color:"#2563eb",accent:"#93c5fd"},

{cat:"Discrete",title:"Binomial Distribution",sym:"X \\sim B(n, p)",
front:"What is the Binomial Distribution?",
back:"Counts the number of successes in n independent, identical Bernoulli trials, each with probability p. Properties: (1) n independent trials, (2) two outcomes per trial, (3) constant p, (4) X = number of successes.",
formulas:["f(x) = \\binom{n}{x} p^x (1-p)^{n-x}, \\quad x = 0, 1, \\dots, n"],
m:"\\mu = np",
v:"\\sigma^2 = np(1-p)",
s:"\\sigma = \\sqrt{np(1-p)}",
ex:"Organic pollution: n=18, p=0.1, P(X=2)=C(18,2)(0.1)\u00b2(0.9)\u00b9\u2076=0.284",
color:"#9333ea",accent:"#c4b5fd"},

{cat:"Discrete",title:"Poisson Distribution",sym:"X \\sim \\text{Poi}(\\lambda)",
front:"What is the Poisson Distribution?",
back:"Models the number of events in a fixed interval (time, area, volume). Events occur independently at constant rate \u03bb. Key property: mean = variance = \u03bb.",
formulas:["f(x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}, \\quad x = 0, 1, 2, \\dots"],
m:"\\mu = \\lambda",
v:"\\sigma^2 = \\lambda",
s:"\\sigma = \\sqrt{\\lambda}",
ex:"Wire flaws: \u03bb=2.3/mm, P(X=2)=e\u207b\u00b2\u00b7\u00b3(2.3\u00b2)/2!=0.265",
color:"#059669",accent:"#6ee7b7"},

{cat:"Discrete",title:"Poisson Process",sym:"N(t) \\sim \\text{Poi}(\\lambda t)",
front:"What are the characteristics of a Poisson Process?",
back:"(1) Counts events in an interval. (2) Each occurrence independent. (3) Infinite events possible. (4) Probability proportional to interval length. (5) Expected rate constant. (6) Mean = Variance.",
formulas:["P(N(t)=k) = \\frac{e^{-\\lambda t}(\\lambda t)^k}{k!}"],
m:"E[N(t)] = \\lambda t",
v:"\\text{Var}[N(t)] = \\lambda t",s:"",
ex:"Wire: \u03bb=2.3/mm \u2192 in 5mm: \u03bbt=11.5, P(X=10)=e\u207b\u00b9\u00b9\u00b7\u2075(11.5\u00b9\u2070)/10!=0.113",
color:"#047857",accent:"#34d399"},

{cat:"Discrete",title:"Geometric Distribution",sym:"X \\sim \\text{Geo}(p)",
front:"What is the Geometric Distribution?",
back:"Number of trials until the FIRST success. Random number of trials, fixed successes (1). The only memoryless discrete distribution.",
formulas:["P(X=x) = p(1-p)^{x-1}, \\quad x = 1, 2, 3, \\dots"],
m:"\\mu = \\dfrac{1}{p}",
v:"\\sigma^2 = \\dfrac{1-p}{p^2}",
s:"",
ex:"Wafer contamination: p=0.01, P(X=125)=(0.99)\u00b9\u00b2\u2074(0.01)=0.00288, \u03bc=100",
color:"#65a30d",accent:"#bef264"},

{cat:"Discrete",title:"Negative Binomial Distribution",sym:"X \\sim \\text{NB}(k, p)",
front:"What is the Negative Binomial Distribution?",
back:"Number of trials until the k-th success. Generalizes Geometric (k=1). Properties: (1) independent identical trials, (2) observe until k-th success, (3) X = total trials needed.",
formulas:["f(x) = \\binom{x-1}{k-1} p^k (1-p)^{x-k}, \\quad x = k, k{+}1, \\dots"],
m:"\\mu = \\dfrac{k}{p}",
v:"\\sigma^2 = \\dfrac{k(1-p)}{p^2}",s:"",
ex:"Camera: p=0.2(fail), k=3 failures, P(X\u22645) = 0.058",
color:"#7c3aed",accent:"#a78bfa"},

{cat:"Discrete",title:"Hypergeometric Distribution",sym:"X \\sim \\text{HG}(N, K, n)",
front:"What is the Hypergeometric Distribution?",
back:"Successes in n draws WITHOUT replacement from population N containing K successes. Unlike Binomial, trials are dependent. The finite population correction factor (N\u2212n)/(N\u22121) reduces the variance relative to Binomial; as n/N \u2192 0 it approaches 1.",
formulas:["f(x) = \\frac{\\dbinom{K}{x}\\dbinom{N-K}{n-x}}{\\dbinom{N}{n}}, \\quad x = 0,1,\\dots,\\min(K,n)"],
m:"\\mu = np \\quad\\text{where } p = K/N",
v:"\\sigma^2 = np(1-p)\\dfrac{N-n}{N-1}",s:"",
ex:"Parts: N=300, K=100(A), n=4, P(all A)=C(100,4)C(200,0)/C(300,4)=0.0119",
color:"#b45309",accent:"#fcd34d"},

{cat:"Discrete",title:"Memoryless Property (Discrete)",sym:"\\text{Geometric}",
front:"What is the Memoryless Property for Discrete RVs?",
back:"The Geometric is the ONLY discrete distribution with this property. Past failures don't affect future probability. P(X > s+t | X > s) = P(X > t).",
formulas:["P(X > s + t \\mid X > s) = P(X > t)"],
m:"",v:"",s:"",
ex:"Haven't rolled a 6 in 10 tries \u2192 chance on next roll is still 1/6",
color:"#57534e",accent:"#a8a29e"},

// ============================================================
// CATEGORY: Continuous Foundations (Lecture 7&8, slides 1-19)
// ============================================================
{cat:"Continuous",title:"Probability Density Function",sym:"f(x)",
front:"What is a Probability Density Function (PDF)?",
back:"For continuous RVs: (1) f(x) \u2265 0, (2) total area = 1, (3) P(a \u2264 X \u2264 b) = integral from a to b. Note: f(x) CAN exceed 1, and P(X = x) = 0 for any single point.",
formulas:["P(a \\le X \\le b) = \\int_a^b f(x)\\,dx, \\quad \\int_{-\\infty}^{\\infty}f(x)\\,dx = 1"],
m:"\\mu = \\int_{-\\infty}^{\\infty} x\\,f(x)\\,dx",
v:"\\sigma^2 = \\int_{-\\infty}^{\\infty}(x-\\mu)^2 f(x)\\,dx = E[X^2]-\\mu^2",s:"",
ex:"Copper wire: f(x)=5 for 4.9\u2264x\u22645.1, P(X<5)=\u222b5dx from 4.9 to 5 = 0.5",
color:"#334155",accent:"#94a3b8"},

{cat:"Continuous",title:"CDF (Continuous)",sym:"F(x) = P(X \\le x)",
front:"What is the CDF of a Continuous RV?",
back:"F(x) = P(X \u2264 x) = integral of f(t) from \u2212\u221e to x. Properties: continuous, non-decreasing, F(\u2212\u221e)=0, F(\u221e)=1. The derivative F'(x) = f(x) recovers the PDF.",
formulas:["F(x) = \\int_{-\\infty}^{x} f(t)\\,dt","P(a < X < b) = F(b) - F(a)","f(x) = \\frac{dF(x)}{dx}"],
m:"",v:"",s:"",
ex:"Reaction time: F(x)=1\u2212e\u207b\u2070\u00b7\u2070\u00b9\u02e3, f(x)=0.01e\u207b\u2070\u00b7\u2070\u00b9\u02e3",
color:"#475569",accent:"#cbd5e1"},

{cat:"Continuous",title:"Mean & Variance (Continuous)",sym:"\\mu,\\; \\sigma^2",
front:"How do you compute Mean, Variance, and E[h(X)] for Continuous RVs?",
back:"Same idea as discrete but with integrals instead of sums. The shortcut formula \u03c3\u00b2 = E[X\u00b2] \u2212 \u03bc\u00b2 is often easier. For any function h(X), integrate h(x)\u00b7f(x).",
formulas:["\\mu = \\int_{-\\infty}^{\\infty} x\\,f(x)\\,dx","\\sigma^2 = \\int_{-\\infty}^{\\infty}(x-\\mu)^2 f(x)\\,dx = E[X^2] - \\mu^2","E[h(X)] = \\int_{-\\infty}^{\\infty} h(x)\\,f(x)\\,dx"],
m:"",v:"",s:"\\sigma = \\sqrt{\\sigma^2}",
ex:"Copper wire: E[power] = E[10\u207b\u2074X\u00b2] = 10\u207b\u2074\u222bx\u00b2\u00b75dx = 1.333 watts",
color:"#0284c7",accent:"#7dd3fc"},

// ============================================================
// CATEGORY: Continuous Distributions (Lecture 7&8, slides 20-104)
// ============================================================
{cat:"Continuous",title:"Continuous Uniform Distribution",sym:"X \\sim U(a,\\,b)",
front:"What is the Continuous Uniform Distribution?",
back:"Simplest continuous distribution. All values between a and b equally likely. PDF is flat. CDF is F(x) = (x\u2212a)/(b\u2212a).",
formulas:["f(x) = \\frac{1}{b-a}, \\quad a \\le x \\le b","F(x) = \\frac{x-a}{b-a}, \\quad a \\le x \\le b"],
m:"\\mu = \\dfrac{a+b}{2}",
v:"\\sigma^2 = \\dfrac{(b-a)^2}{12}",
s:"",
ex:"Bus wait: U(0,20), \u03bc=10 min, \u03c3\u00b2=33.33, P(X>9)=11/20",
color:"#dc2626",accent:"#fca5a5"},

{cat:"Continuous",title:"Normal Distribution",sym:"X \\sim \\mathcal{N}(\\mu,\\,\\sigma^2)",
front:"What is the Normal Distribution?",
back:"Bell-shaped, symmetric about \u03bc. The single most important distribution. Empirical Rule: ~68.27% within \u00b11\u03c3, ~95.45% within \u00b12\u03c3, ~99.73% within \u00b13\u03c3.",
formulas:["f(x) = \\frac{1}{\\sigma\\sqrt{2\\pi}}\\,e^{\\displaystyle -\\frac{(x-\\mu)^2}{2\\sigma^2}}, \\quad -\\infty < x < \\infty"],
m:"E(X) = \\mu",
v:"\\text{Var}(X) = \\sigma^2",
s:"\\text{SD}(X) = \\sigma",
ex:"Current: X~N(10,4), P(9<X<11)=P(\u22120.5<Z<0.5)=0.383",
color:"#2563eb",accent:"#93c5fd"},

{cat:"Continuous",title:"Standard Normal & Standardizing",sym:"Z = \\dfrac{X-\\mu}{\\sigma}",
front:"What is the Standard Normal Distribution and how do you Standardize?",
back:"Z ~ N(0,1). Convert any Normal X to Z by subtracting \u03bc and dividing by \u03c3. Then use the Z-table: \u03a6(z) = P(Z \u2264 z). Four steps: Transform \u2192 Draw \u2192 Shade \u2192 Read.",
formulas:["Z = \\frac{X - \\mu}{\\sigma} \\;\\Rightarrow\\; Z \\sim \\mathcal{N}(0,1)","\\Phi(z) = P(Z \\le z) \\quad\\text{(from Z-table)}"],
m:"E(Z) = 0",v:"\\text{Var}(Z) = 1",s:"\\sigma = 1",
ex:"X~N(10,4): P(X<11)=P(Z<0.5)=\u03a6(0.5)=0.6915",
color:"#1d4ed8",accent:"#60a5fa"},

{cat:"Continuous",title:"Normal Approx. to Binomial",sym:"X \\sim B(n,p) \\approx \\mathcal{N}",
front:"How do you approximate Binomial probabilities with the Normal?",
back:"When np > 5 and n(1\u2212p) > 5, Binomial \u2248 Normal. Apply continuity correction \u00b10.5: P(X \u2264 x) \u2248 P(Z \u2264 (x+0.5\u2212np)/\u221a(np(1\u2212p))), P(X \u2265 x) uses x\u22120.5.",
formulas:["Z = \\frac{X - np}{\\sqrt{np(1-p)}}","P(X \\le x) \\approx P\\!\\left(Z \\le \\frac{x+0.5-np}{\\sqrt{np(1-p)}}\\right)","P(X \\ge x) \\approx P\\!\\left(Z \\ge \\frac{x-0.5-np}{\\sqrt{np(1-p)}}\\right)"],
m:"np",v:"np(1-p)",s:"",
ex:"n=16M, p=10\u207b\u2075: P(X\u2264150)\u2248P(Z\u2264(150.5\u2212160)/12.65)=P(Z\u2264\u22120.75)=0.2263",
color:"#3730a3",accent:"#6366f1"},

{cat:"Continuous",title:"Normal Approx. to Poisson",sym:"X \\sim \\text{Poi}(\\lambda) \\approx \\mathcal{N}",
front:"How do you approximate Poisson probabilities with the Normal?",
back:"When \u03bb \u2265 5, Poisson \u2248 Normal with \u03bc = \u03bb and \u03c3\u00b2 = \u03bb. Apply the same continuity correction as for Binomial.",
formulas:["Z = \\frac{X - \\lambda}{\\sqrt{\\lambda}}","P(X \\le x) \\approx P\\!\\left(Z \\le \\frac{x+0.5-\\lambda}{\\sqrt{\\lambda}}\\right)"],
m:"\\lambda",v:"\\lambda",s:"",
ex:"Asbestos: \u03bb=1000, P(X\u2264950)\u2248P(Z\u2264(950.5\u22121000)/\u221a1000)=P(Z\u2264\u22121.57)=0.058",
color:"#312e81",accent:"#a5b4fc"},

{cat:"Continuous",title:"Normal Approx. to Hypergeometric",sym:"\\text{HG} \\approx \\mathcal{N}",
front:"When can you use Normal to approximate Hypergeometric?",
back:"The Hypergeometric is similar to Binomial with p=K/N. When sample sizes are small relative to population (n/N small), use Binomial approximation first, then Normal if np>5 and n(1\u2212p)>5.",
formulas:["p = K/N, \\quad \\text{use } \\mathcal{N}(np,\\; np(1-p))","\\text{when } np > 5 \\text{ and } n(1-p) > 5"],
m:"np",v:"np(1-p)",s:"",
ex:"Customers: N=1000,K=700,n=50 \u2192 p=0.7, np=35>5, use Normal approx.",
color:"#4338ca",accent:"#818cf8"},

{cat:"Continuous",title:"Exponential Distribution",sym:"X \\sim \\text{Exp}(\\lambda)",
front:"What is the Exponential Distribution?",
back:"Models waiting time until the NEXT event in a Poisson process with rate \u03bb. Always non-negative, positively skewed. Special property: mean = standard deviation = 1/\u03bb. The only continuous memoryless distribution.",
formulas:["f(x) = \\lambda e^{-\\lambda x}, \\quad x \\ge 0","F(x) = 1 - e^{-\\lambda x}","P(X > x_0) = e^{-\\lambda x_0}"],
m:"\\mu = \\dfrac{1}{\\lambda}",
v:"\\sigma^2 = \\dfrac{1}{\\lambda^2}",
s:"\\sigma = \\dfrac{1}{\\lambda} \\;(= \\mu)",
ex:"Log-ons: \u03bb=25/hr, P(X>0.1)=e\u207b\u00b2\u00b7\u2075=0.082, \u03bc=\u03c3=1/25 hr=2.4 min",
color:"#ea580c",accent:"#fdba74"},

{cat:"Continuous",title:"Memoryless Property (Continuous)",sym:"\\text{Exponential}",
front:"What is the Lack of Memory Property for Continuous RVs?",
back:"Exponential is the ONLY continuous distribution with this property. P(X \u2264 t+s | X > t) = P(X \u2264 s). The result depends only on s, not on t \u2014 the distribution \u2018forgets\u2019 how long you've waited.",
formulas:["P(X \\le t+s \\mid X > t) = P(X \\le s) = 1 - e^{-\\lambda s}"],
m:"",v:"",s:"",
ex:"Geiger counter: E(X)=1.4 min, P(detect in 30s)=0.30 whether you just started or waited 3 min",
color:"#92400e",accent:"#fcd34d"},

{cat:"Continuous",title:"Gamma Distribution",sym:"X \\sim \\text{Gamma}(\\alpha,\\,\\lambda)",
front:"What is the Gamma Distribution?",
back:"Models waiting time until the \u03b1-th event in a Poisson process with rate \u03bb. It is a sum of \u03b1 independent Exponential(\u03bb) RVs. When \u03b1=1 \u2192 Exponential. When \u03b1 is an integer \u2192 Erlang distribution.",
formulas:["f(x) = \\frac{\\lambda^\\alpha\\, x^{\\alpha-1}\\, e^{-\\lambda x}}{\\Gamma(\\alpha)}, \\quad x > 0"],
m:"\\mu = \\dfrac{\\alpha}{\\lambda}",
v:"\\sigma^2 = \\dfrac{\\alpha}{\\lambda^2}",
s:"\\sigma = \\dfrac{\\sqrt{\\alpha}}{\\lambda}",
ex:"Micro-array: \u03bb=0.5/hr, \u03b1=10 slides, \u03bc=20 hrs, \u03c3\u00b2=40, P(X>25)=0.2014",
color:"#c026d3",accent:"#f0abfc"},

{cat:"Continuous",title:"Erlang Distribution",sym:"X \\sim \\text{Erlang}(\\alpha,\\,\\lambda)",
front:"What is the Erlang Distribution?",
back:"Special case of Gamma where \u03b1 is a positive integer. Models time until the \u03b1-th event in a Poisson process. When \u03b1 is integer: \u0393(\u03b1) = (\u03b1\u22121)! which simplifies the formula.",
formulas:["f(x) = \\frac{\\lambda^\\alpha\\, x^{\\alpha-1}\\, e^{-\\lambda x}}{(\\alpha-1)!}, \\quad x > 0, \\;\\alpha \\in \\mathbb{Z}^+"],
m:"\\mu = \\dfrac{\\alpha}{\\lambda}",
v:"\\sigma^2 = \\dfrac{\\alpha}{\\lambda^2}",s:"",
ex:"Processor: \u03bb=0.0001 failures/hr, \u03b1=4, P(X>40000) via Poisson relationship",
color:"#a21caf",accent:"#e879f9"},

{cat:"Continuous",title:"Gamma/Poisson/Exponential Link",sym:"X = T_1 + \\cdots + T_\\alpha",
front:"How are Gamma, Exponential, and Poisson related?",
back:"In a Poisson process with rate \u03bb: (1) N(t) ~ Poisson(\u03bbt) counts events. (2) Time between events T\u1d62 ~ Exp(\u03bb). (3) Time until \u03b1-th event X = \u03a3T\u1d62 ~ Gamma(\u03b1,\u03bb). Key equivalence: P(X > x) = P(N(x) < \u03b1).",
formulas:["X > x \\;\\Longleftrightarrow\\; N(x) < \\alpha","P(X > x) = \\sum_{n=0}^{\\alpha-1} \\frac{e^{-\\lambda x}(\\lambda x)^n}{n!}"],
m:"",v:"",s:"",
ex:"10 slides, \u03bb=0.5: P(X>25) = P(N(25)\u22649) where N(25)~Poi(12.5) = 0.2014",
color:"#7c3aed",accent:"#a78bfa"},

{cat:"Continuous",title:"Gamma Function",sym:"\\Gamma(\\alpha)",
front:"What is the Gamma Function and its key properties?",
back:"\u0393(\u03b1) = \u222b\u2080^\u221e x^(\u03b1\u22121) e^(\u2212x) dx for \u03b1>0. Recursive: \u0393(\u03b1) = (\u03b1\u22121)\u0393(\u03b1\u22121). For integer \u03b1: \u0393(\u03b1) = (\u03b1\u22121)!. Special values: \u0393(1)=1, \u0393(1/2)=\u221a\u03c0.",
formulas:["\\Gamma(\\alpha) = \\int_0^\\infty x^{\\alpha-1}e^{-x}\\,dx","\\Gamma(\\alpha) = (\\alpha-1)\\,\\Gamma(\\alpha-1)","\\Gamma(n) = (n-1)! \\;\\text{for integer } n","\\Gamma(\\tfrac{1}{2}) = \\sqrt{\\pi}"],
m:"",v:"",s:"",
ex:"\u0393(4) = 3! = 6, \u0393(1/2) = \u221a\u03c0 \u2248 1.77, \u0393(3/2) = (1/2)\u221a\u03c0 \u2248 0.886",
color:"#6d28d9",accent:"#c4b5fd"},

{cat:"Continuous",title:"Weibull Distribution",sym:"X \\sim \\text{Weibull}(\\alpha,\\,\\lambda)",
front:"What is the Weibull Distribution?",
back:"Flexible lifetime model. \u03b1 (shape) controls failure pattern: \u03b1<1 (early failures, decreasing rate), \u03b1=1 (constant rate = Exponential), \u03b1>1 (wear-out, increasing rate). \u03bb (scale) is typical lifetime.",
formulas:["f(x) = \\frac{\\alpha}{\\lambda}\\left(\\frac{x}{\\lambda}\\right)^{\\!\\alpha-1} e^{-(x/\\lambda)^\\alpha}, \\quad x > 0","F(x) = 1 - e^{-(x/\\lambda)^\\alpha}"],
m:"\\mu = \\lambda\\,\\Gamma\\!\\left(1 + \\tfrac{1}{\\alpha}\\right)",
v:"\\sigma^2 = \\lambda^2\\!\\left[\\Gamma\\!\\left(1{+}\\tfrac{2}{\\alpha}\\right) - \\Gamma^2\\!\\left(1{+}\\tfrac{1}{\\alpha}\\right)\\right]",s:"",
ex:"Bearing wear-out: \u03b1=2, \u03bb=5000, E(X)=5000\u00b7\u0393(1.5)=5000\u00b7(\u221a\u03c0/2)\u22484431 hrs",
color:"#be185d",accent:"#f9a8d4"},

{cat:"Continuous",title:"Lognormal Distribution",sym:"X \\sim \\text{Lognormal}(\\mu_W,\\,\\sigma_W)",
front:"What is the Lognormal Distribution?",
back:"If W = ln(X) ~ N(\u03bc_W, \u03c3\u00b2_W), then X is Lognormal. Always positive, right-skewed. The logarithm of the lifetime is normally distributed. Arises from multiplicative variability.",
formulas:["f(x) = \\frac{1}{x\\sigma_W\\sqrt{2\\pi}}\\,e^{\\displaystyle -\\frac{(\\ln x - \\mu_W)^2}{2\\sigma_W^2}}, \\quad x > 0","\\ln(X) \\sim \\mathcal{N}(\\mu_W, \\sigma_W^2)"],
m:"E(X) = e^{\\mu_W + \\sigma_W^2/2}",
v:"\\text{Var}(X) = e^{2\\mu_W + \\sigma_W^2}(e^{\\sigma_W^2}-1)",s:"",
ex:"Laser: \u03bc_W=10, \u03c3_W=1.5, P(X>10000)=1\u2212\u03a6((ln10000\u221210)/1.5)=0.701",
color:"#d97706",accent:"#fbbf24"},

{cat:"Continuous",title:"Beta Distribution",sym:"X \\sim \\text{Beta}(\\alpha,\\,\\beta)",
front:"What is the Beta Distribution?",
back:"Defined on [0,1], models proportions and normalized quantities. Arises as X/(X+Y) where X~Gamma(\u03b1,\u03bb) and Y~Gamma(\u03b2,\u03bb) are independent. When \u03b1=\u03b2=1 \u2192 Uniform(0,1).",
formulas:["f(x) = \\frac{\\Gamma(\\alpha+\\beta)}{\\Gamma(\\alpha)\\,\\Gamma(\\beta)}\\,x^{\\alpha-1}(1-x)^{\\beta-1}, \\quad 0 < x < 1"],
m:"\\mu = \\dfrac{\\alpha}{\\alpha+\\beta}",
v:"\\sigma^2 = \\dfrac{\\alpha\\beta}{(\\alpha+\\beta)^2(\\alpha+\\beta+1)}",s:"",
ex:"Project: \u03b1=2.5, \u03b2=1, P(X>0.7)=1\u22120.7\u00b2\u00b7\u2075\u22480.59, E(X)=0.714",
color:"#0891b2",accent:"#67e8f9"},

// ============================================================
// CATEGORY: Joint Distributions (Lecture 9&10, Ch.5)
// ============================================================
{cat:"Joint",title:"Joint Probability Mass Function",sym:"f_{XY}(x,y)",
front:"What is a Joint PMF (Discrete)?",
back:"Gives the probability that X = x AND Y = y simultaneously. Three conditions: (1) f(x,y) \u2265 0, (2) \u03a3\u03a3 f(x,y) = 1, (3) f(x,y) = P(X=x, Y=y). For a region R: P((X,Y) \u2208 R) = \u03a3\u03a3 over R.",
formulas:["f_{XY}(x,y) \\ge 0","\\sum_x \\sum_y f_{XY}(x,y) = 1","P\\bigl((X,Y) \\in R\\bigr) = \\sum\\sum_{(x,y)\\in R} f_{XY}(x,y)"],
m:"",v:"",s:"",
ex:"Computer network: X = number of servers, Y = number of printers, tabulate f(x,y) in a probability table",
color:"#ec4899",accent:"#f9a8d4"},

{cat:"Joint",title:"Joint Probability Density Function",sym:"f_{XY}(x,y)",
front:"What is a Joint PDF (Continuous)?",
back:"For continuous RVs: (1) f(x,y) \u2265 0, (2) total volume = 1, (3) P((X,Y) \u2208 R) = double integral over R. Unlike PMFs, f(x,y) can exceed 1 and P(X=x, Y=y)=0 for any single point.",
formulas:["\\int_{-\\infty}^{\\infty}\\int_{-\\infty}^{\\infty} f_{XY}(x,y)\\,dx\\,dy = 1","P\\bigl((X,Y) \\in R\\bigr) = \\iint_R f_{XY}(x,y)\\,dx\\,dy"],
m:"",v:"",s:"",
ex:"Surface roughness (X) and bore diameter (Y): P(1.5<X, 4.0<Y) = \u222b\u222b f(x,y)dxdy",
color:"#db2777",accent:"#fbcfe8"},

{cat:"Joint",title:"Marginal Probability Distributions",sym:"f_X(x),\\; f_Y(y)",
front:"How do you find Marginal Distributions from the Joint?",
back:"Sum (discrete) or integrate (continuous) out the other variable. The marginal gives the distribution of one variable ignoring the other. Discrete: f_X(x) = \u03a3_y f(x,y). Continuous: f_X(x) = \u222b f(x,y) dy.",
formulas:["f_X(x) = \\sum_{y} f_{XY}(x,y)","f_Y(y) = \\sum_{x} f_{XY}(x,y)","f_X(x) = \\int_{-\\infty}^{\\infty} f_{XY}(x,y)\\,dy"],
m:"",v:"",s:"",
ex:"From joint table: sum each row to get f_X(x), sum each column to get f_Y(y)",
color:"#be185d",accent:"#fda4af"},

{cat:"Joint",title:"Conditional Probability Distribution",sym:"f_{Y|X}(y|x)",
front:"What is a Conditional Distribution?",
back:"The distribution of Y given that X = x. Obtained by dividing the joint by the marginal. For discrete: f(y|x) = f(x,y)/f_X(x). For continuous: same formula. The conditional PMF/PDF satisfies all standard conditions.",
formulas:["f_{Y|X}(y|x) = \\frac{f_{XY}(x,y)}{f_X(x)}, \\quad f_X(x)>0"],
m:"E(Y|X=x) = \\sum_y y\\,f_{Y|X}(y|x)",v:"",s:"",
ex:"Given X=1 defect on layer A, what is P(Y=0 defects on layer B)?",
color:"#9d174d",accent:"#f472b6"},

{cat:"Joint",title:"Independence of Random Variables",sym:"f_{XY} = f_X \\cdot f_Y",
front:"When are two Random Variables independent?",
back:"X and Y are independent iff f(x,y) = f_X(x)\u00b7f_Y(y) for ALL x, y. If independent: E(XY) = E(X)\u00b7E(Y) and Cov(X,Y) = 0. But Cov=0 does NOT always imply independence (it does for Bivariate Normal).",
formulas:["f_{XY}(x,y) = f_X(x) \\cdot f_Y(y) \\quad \\text{for all } x,y","\\text{If independent: } E(XY) = E(X)\\,E(Y)","\\text{If independent: } \\text{Cov}(X,Y) = 0"],
m:"",v:"",s:"",
ex:"If P(X=0,Y=0) = P(X=0)\u00b7P(Y=0), check this for ALL (x,y) pairs to confirm independence",
color:"#831843",accent:"#f0abfc"},

{cat:"Joint",title:"Covariance",sym:"\\sigma_{XY} = \\text{Cov}(X,Y)",
front:"What is Covariance?",
back:"Measures the linear association between X and Y. Positive: X and Y tend to increase together. Negative: one increases as the other decreases. Zero: no linear relationship. Shortcut formula avoids computing \u03bc\u2093 and \u03bc\u1d67 first.",
formulas:["\\sigma_{XY} = E\\bigl[(X-\\mu_X)(Y-\\mu_Y)\\bigr]","\\sigma_{XY} = E(XY) - \\mu_X \\mu_Y","\\text{Cov}(X,Y) = E(XY) - E(X)\\,E(Y)"],
m:"",v:"",s:"",
ex:"E(X)=1.5, E(Y)=2.6, E(XY)=3.5 \u2192 Cov = 3.5 \u2212 (1.5)(2.6) = \u22120.4",
color:"#a21caf",accent:"#e879f9"},

{cat:"Joint",title:"Correlation",sym:"\\rho_{XY}",
front:"What is the Correlation Coefficient?",
back:"Standardized version of covariance; always \u22121 \u2264 \u03c1 \u2264 1. Measures strength and direction of LINEAR relationship. |\u03c1|=1 means perfect linear relationship. \u03c1=0 means no linear association. Unitless.",
formulas:["\\rho_{XY} = \\frac{\\text{Cov}(X,Y)}{\\sqrt{V(X)\\,V(Y)}} = \\frac{\\sigma_{XY}}{\\sigma_X\\,\\sigma_Y}","-1 \\le \\rho_{XY} \\le 1"],
m:"",v:"",s:"",
ex:"Cov(X,Y)=\u22120.4, \u03c3_X=0.7, \u03c3_Y=0.5 \u2192 \u03c1 = \u22120.4/(0.7\u00b70.5) = \u22121.14 (check: values may need correction)",
color:"#7c3aed",accent:"#a78bfa"},

{cat:"Joint",title:"Multinomial Distribution",sym:"\\text{Multinomial}(n, p_1, \\dots, p_k)",
front:"What is the Multinomial Distribution?",
back:"Generalizes the Binomial to k \u2265 2 outcomes per trial. In n independent trials, each trial results in one of k categories with probabilities p\u2081, ..., p\u2096. The joint PMF gives P(X\u2081=x\u2081, ..., X\u2096=x\u2096).",
formulas:["P = \\frac{n!}{x_1!\\,x_2!\\cdots x_k!}\\,p_1^{x_1}\\,p_2^{x_2}\\cdots p_k^{x_k}","\\sum_{i=1}^k x_i = n, \\quad \\sum_{i=1}^k p_i = 1"],
m:"E(X_i) = np_i",v:"V(X_i) = np_i(1-p_i)",s:"",
ex:"20 parts from 3 suppliers: p\u2081=0.3, p\u2082=0.5, p\u2083=0.2, P(4,10,6)=20!/(4!10!6!)(0.3)\u2074(0.5)\u00b9\u2070(0.2)\u2076",
color:"#6d28d9",accent:"#c4b5fd"},

{cat:"Joint",title:"Bivariate Normal Distribution",sym:"(X,Y) \\sim \\text{BVN}",
front:"What is the Bivariate Normal Distribution?",
back:"Joint distribution of two correlated Normal RVs with 5 parameters: \u03bc\u2093, \u03bc\u1d67, \u03c3\u2093, \u03c3\u1d67, \u03c1. Key properties: each marginal is Normal; each conditional is Normal; if \u03c1=0 then X and Y are independent (unique to BVN). Conditional mean is a linear function of the given value.",
formulas:["E(Y|X{=}x) = \\mu_Y + \\rho\\frac{\\sigma_Y}{\\sigma_X}(x - \\mu_X)","V(Y|X{=}x) = \\sigma_Y^2(1 - \\rho^2)"],
m:"",v:"",s:"",
ex:"Heights (X) and weights (Y): E(Y|X=72) = \u03bc_Y + \u03c1(\u03c3_Y/\u03c3_X)(72\u2212\u03bc_X)",
color:"#4f46e5",accent:"#818cf8"},

{cat:"Joint",title:"Linear Combinations of RVs",sym:"Y = \\sum c_i X_i",
front:"What are the Mean and Variance of a Linear Combination?",
back:"For Y = c\u2081X\u2081 + ... + c\u209aX\u209a: the mean always splits. The variance has cross-terms involving covariances. If X\u1d62 are independent, covariance terms vanish and variances simply scale by c\u1d62\u00b2.",
formulas:["E(Y) = \\sum_{i=1}^p c_i\\,E(X_i)","V(Y) = \\sum_{i=1}^p c_i^2\\,V(X_i) + 2\\!\\sum_{i<j} c_i c_j\\,\\text{Cov}(X_i,X_j)","\\text{If independent: } V(Y) = \\sum_{i=1}^p c_i^2\\,V(X_i)"],
m:"",v:"",s:"",
ex:"Y=3X\u2081\u22122X\u2082 (indep.): E(Y)=3E(X\u2081)\u22122E(X\u2082), V(Y)=9V(X\u2081)+4V(X\u2082)",
color:"#3730a3",accent:"#6366f1"},

{cat:"Joint",title:"Reproductive Property of Normal",sym:"\\sum c_i X_i \\sim \\mathcal{N}",
front:"What is the Reproductive Property of the Normal Distribution?",
back:"If X\u2081, ..., X\u209a are independent Normal RVs, then any linear combination Y = \u03a3c\u1d62X\u1d62 is also Normal. The mean and variance follow the linear combination rules. This is a key property that makes the Normal distribution so useful.",
formulas:["X_i \\sim \\mathcal{N}(\\mu_i, \\sigma_i^2) \\;\\text{(independent)}","Y = \\sum c_i X_i \\sim \\mathcal{N}\\!\\left(\\sum c_i \\mu_i,\\; \\sum c_i^2 \\sigma_i^2\\right)"],
m:"",v:"",s:"",
ex:"X\u2081~N(2,4), X\u2082~N(3,9) indep. \u2192 X\u2081+X\u2082 ~ N(5,13), X\u2081\u2212X\u2082 ~ N(\u22121,13)",
color:"#312e81",accent:"#a5b4fc"},

// ============================================================
// CATEGORY: Functions & Moments (Lecture 9&10)
// ============================================================
{cat:"Functions",title:"Mean & Variance of the Average",sym:"\\bar{X} = \\frac{1}{n}\\sum X_i",
front:"What are the Mean and Variance of a Sample Average?",
back:"If X\u2081, ..., X\u2099 are independent with common mean \u03bc and variance \u03c3\u00b2, the sample mean X\u0304 has mean \u03bc and variance \u03c3\u00b2/n. Averaging reduces variability by a factor of n. If X\u1d62 are Normal, X\u0304 is also Normal.",
formulas:["E(\\bar{X}) = \\mu","V(\\bar{X}) = \\frac{\\sigma^2}{n}","\\bar{X} \\sim \\mathcal{N}\\!\\left(\\mu,\\, \\frac{\\sigma^2}{n}\\right) \\;\\text{if } X_i \\sim \\mathcal{N}(\\mu,\\sigma^2)"],
m:"",v:"",s:"",
ex:"X\u1d62~N(50,16), n=4: X\u0304~N(50,4), \u03c3_X\u0304=2 (halved from \u03c3=4)",
color:"#06b6d4",accent:"#67e8f9"},

{cat:"Functions",title:"Moments about the Origin",sym:"\\mu'_r = E[X^r]",
front:"What are Moments of a Random Variable?",
back:"The r-th moment about the origin is \u03bc'_r = E[X^r]. The first moment \u03bc'_1 = E[X] = \u03bc (the mean). The variance can be computed as \u03c3\u00b2 = \u03bc'_2 \u2212 (\u03bc'_1)\u00b2.",
formulas:["\\mu'_r = E[X^r] = \\sum_x x^r f(x) \\;\\text{(discrete)}","\\mu'_r = E[X^r] = \\int_{-\\infty}^{\\infty} x^r f(x)\\,dx \\;\\text{(continuous)}","\\sigma^2 = \\mu'_2 - (\\mu'_1)^2"],
m:"",v:"",s:"",
ex:"\u03bc'_1 = E[X] = mean, \u03bc'_2 = E[X\u00b2], \u03c3\u00b2 = E[X\u00b2]\u2212(E[X])\u00b2",
color:"#0891b2",accent:"#a5f3fc"},

{cat:"Functions",title:"Moment Generating Function",sym:"M_X(t) = E[e^{tX}]",
front:"What is the Moment Generating Function (MGF)?",
back:"M_X(t) = E[e^{tX}] generates all moments via derivatives evaluated at t=0. The r-th moment equals the r-th derivative of M_X(t) at t=0. The MGF uniquely determines a distribution (if it exists).",
formulas:["M_X(t) = E\\bigl[e^{tX}\\bigr]","\\mu'_r = \\frac{d^r}{dt^r} M_X(t)\\Bigg|_{t=0}","E(X) = M'_X(0), \\quad E(X^2) = M''_X(0)"],
m:"",v:"",s:"",
ex:"Poisson(\u03bb): M(t) = e^{\u03bb(e^t\u22121)}, M'(0)=\u03bb, M''(0)=\u03bb+\u03bb\u00b2, so Var=\u03bb",
color:"#0e7490",accent:"#22d3ee"},

{cat:"Functions",title:"MGF of a Sum",sym:"M_{\\sum X_i}(t)",
front:"What is the MGF of a Sum of Independent RVs?",
back:"If X\u2081, ..., X\u2099 are independent, the MGF of their sum is the PRODUCT of their individual MGFs. This is extremely useful for proving reproductive properties (e.g., sum of independent Normals is Normal, sum of independent Poissons is Poisson).",
formulas:["M_{X_1+\\cdots+X_n}(t) = M_{X_1}(t)\\cdot M_{X_2}(t)\\cdots M_{X_n}(t)","M_{X_1+\\cdots+X_n}(t) = \\prod_{i=1}^n M_{X_i}(t)"],
m:"",v:"",s:"",
ex:"X\u1d62~Poi(\u03bb\u1d62) indep. \u2192 \u03a3X\u1d62~Poi(\u03a3\u03bb\u1d62) since product of MGFs gives Poisson MGF",
color:"#155e75",accent:"#cffafe"},

{cat:"Functions",title:"Functions of a Random Variable",sym:"Y = h(X)",
front:"How do you find the distribution of Y = h(X)?",
back:"Discrete: directly compute P(Y=y) by summing P(X=x) for all x where h(x)=y. Continuous: if h is monotone, use the Jacobian method: f_Y(y) = f_X(h\u207b\u00b9(y))\u00b7|dh\u207b\u00b9(y)/dy|.",
formulas:["\\text{Discrete: } P(Y=y) = \\sum_{x:\\,h(x)=y} f_X(x)","\\text{Continuous: } f_Y(y) = f_X\\bigl(h^{-1}(y)\\bigr)\\cdot\\left|\\frac{dh^{-1}(y)}{dy}\\right|"],
m:"",v:"",s:"",
ex:"X~Exp(\u03bb), Y=2X \u2192 h\u207b\u00b9(y)=y/2, |J|=1/2, f_Y(y) = (\u03bb/2)e^{\u2212\u03bby/2}",
color:"#164e63",accent:"#99f6e4"},

{cat:"Functions",title:"Functions of Two RVs",sym:"Y = h(X_1, X_2)",
front:"How do you find E[h(X\u2081,X\u2082)] for two RVs?",
back:"The expected value of a function of two RVs uses the joint distribution: sum or integrate h(x\u2081,x\u2082)\u00b7f(x\u2081,x\u2082). This generalizes the single-variable case and is used to compute E(XY), Cov(X,Y), etc.",
formulas:["E[h(X_1,X_2)] = \\sum_{x_1}\\sum_{x_2} h(x_1,x_2)\\,f(x_1,x_2)","E[h(X_1,X_2)] = \\int\\!\\int h(x_1,x_2)\\,f(x_1,x_2)\\,dx_1\\,dx_2"],
m:"",v:"",s:"",
ex:"E(XY) = \u03a3\u03a3 xy\u00b7f(x,y) used to compute Cov(X,Y) = E(XY)\u2212E(X)E(Y)",
color:"#134e4a",accent:"#5eead4"},
];

// ---- State ----
let cur=0,flp=false,known=new Set(),cat="All",srch="";
const cats=["All","Discrete","Continuous","Joint","Functions"];
const cc={All:"#3b82f6",Discrete:"#9333ea",Continuous:"#059669",Joint:"#ec4899",Functions:"#06b6d4"};

function getF(){let f=CARDS;if(cat!=="All")f=f.filter(c=>c.cat===cat);if(srch){const q=srch.toLowerCase();f=f.filter(c=>c.title.toLowerCase().includes(q)||c.front.toLowerCase().includes(q)||c.back.toLowerCase().includes(q)||c.ex.toLowerCase().includes(q));}return f;}

function render(){
const a=document.getElementById('app'),f=getF(),c=f[cur];
let dots=f.map((x,i)=>{const g=CARDS.indexOf(x),ac=i===cur,kn=known.has(g);return`<div class="dot ${ac?'active':''} ${kn?'known':''}" style="background:${kn?'#4ade80':ac?(c?.color||'#3b82f6'):'#475569'}" onclick="goTo(${i})"></div>`;}).join('');
let filt=cats.map(ct=>`<button class="filter-btn ${cat===ct?'active':''}" style="--cat-color:${cc[ct]}" onclick="setCat('${ct}')">${ct}${ct!=='All'?' ('+CARDS.filter(x=>x.cat===ct).length+')':''}</button>`).join('');
const lc=f.filter(x=>known.has(CARDS.indexOf(x))).length,pr=f.length?(lc/f.length*100):0;
let ch='';
if(!c){ch=`<div class="empty-state"><p style="font-size:20px;margin-bottom:8px">No cards found</p><p>Try a different search or category.</p></div>`;}
else{
const gi=CARDS.indexOf(c),ik=known.has(gi);
let fml=c.formulas.map(x=>`<div class="formula-line">${texD(x)}</div>`).join('');
let mv='';
if(c.m||c.v||c.s){let r='';
if(c.m)r+=`<div class="math-row"><span class="math-label">Mean:</span><span>${tex(c.m)}</span></div>`;
if(c.v)r+=`<div class="math-row"><span class="math-label">Variance:</span><span>${tex(c.v)}</span></div>`;
if(c.s)r+=`<div class="math-row"><span class="math-label">Std Dev:</span><span>${tex(c.s)}</span></div>`;
mv=`<div class="info-box" style="background:${c.color}10;border:1px solid ${c.color}20"><div class="info-label">Mean, Variance & SD</div><div style="color:${c.accent}">${r}</div></div>`;}
ch=`
<div class="card-container" onclick="doFlip()">
<div class="card-inner ${flp?'flipped':''}">
<div class="card-face card-front" style="background:linear-gradient(160deg,${c.color}18 0%,#1e293b 40%,${c.color}10 100%);border:1.5px solid ${c.color}55;box-shadow:0 20px 60px ${c.color}20">
<div class="card-category" style="color:${c.accent}">${c.title}</div>
<div class="card-symbol" style="color:${c.accent}">${tex(c.sym)}</div>
<div class="card-question">${c.front}</div>
<div class="flip-hint"><span style="font-size:16px">\u21bb</span> Tap to reveal answer</div>
</div>
<div class="card-face card-back" style="background:linear-gradient(160deg,${c.color}25 0%,#1e293b 30%,#1e293b 70%,${c.color}15 100%);border:1.5px solid ${c.color}55;box-shadow:0 20px 60px ${c.color}20">
<div class="card-back-title" style="color:${c.accent}">${c.title} \u2014 Answer</div>
<p class="card-desc">${c.back}</p>
<div class="info-box" style="background:${c.color}18;border:1px solid ${c.color}30">
<div class="info-label">Key Formula</div>
<div style="color:${c.accent}">${fml}</div>
</div>
${mv}
<div class="info-box" style="background:#ffffff08;border:1px solid #ffffff10">
<div class="info-label">Course Example</div>
<div class="info-example">${c.ex}</div>
</div>
</div></div></div>
<div class="controls">
<button class="nav-btn" onclick="event.stopPropagation();goPrev()" ${cur===0?'disabled':''}>&#8592;</button>
<button class="learn-btn ${ik?'learned':''}" onclick="event.stopPropagation();togKnown()">${ik?'\u2713 Learned':'Mark as Learned'}</button>
<button class="nav-btn" onclick="event.stopPropagation();goNext()" ${cur>=f.length-1?'disabled':''} style="border-color:${c.color};background:${c.color}30">&#8594;</button>
</div>
<div class="card-num">${cur+1} of ${f.length}</div>`;}
a.innerHTML=`<h1>\ud83d\udcca STAT 253 \u2013 Distributions</h1><p class="subtitle">Lectures 5\u201310 \u00b7 Tap to flip \u00b7 ${CARDS.length} cards</p>
<div class="search-wrap"><span class="search-icon">\ud83d\udd0d</span><input class="search-input" type="text" placeholder="Search cards..." value="${srch}" oninput="onSrch(this.value)"></div>
<div class="filter-bar">${filt}</div>
<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${pr}%"></div></div><span class="progress-label">${lc}/${f.length}</span></div>
<div class="dots">${dots}</div>${ch}`;}

function doFlip(){flp=!flp;render()}
function goNext(){if(cur<getF().length-1){cur++;flp=false;render()}}
function goPrev(){if(cur>0){cur--;flp=false;render()}}
function goTo(i){cur=i;flp=false;render()}
function togKnown(){const f=getF(),g=CARDS.indexOf(f[cur]);known.has(g)?known.delete(g):known.add(g);render()}
function setCat(c2){cat=c2;cur=0;flp=false;render()}
function onSrch(v){srch=v;cur=0;flp=false;render()}
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;if(e.key==='ArrowRight')goNext();else if(e.key==='ArrowLeft')goPrev();else if(e.key===' '||e.key==='Enter'){e.preventDefault();doFlip()}});
let ts=0;document.addEventListener('touchstart',e=>{ts=e.changedTouches[0].screenX});
document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-ts;if(Math.abs(d)>60){d<0?goNext():goPrev()}});
render();
</script>
</body>
</html>
